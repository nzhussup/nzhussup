name: Update Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update-languages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update active languages section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_NAME: nzhussup-studio
        run: python scripts/update_org_languages.py

      - name: Update skill badge section
        env:
          SKILLS_API_URL: https://api.nzhussup.dev/v1/base/skill
        run: python scripts/update_skill_badges.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore(readme): refresh org language and skill sections"
